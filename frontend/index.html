<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-void:      #020408;
      --bg-base:      #060a14;
      --bg-surface:   #0a0f1e;
      --bg-elevated:  #0e1428;
      --bg-hover:     #141c38;
      --border:       #1a2545;
      --border-soft:  #121a35;
      --border-glow:  #2040a0;

      --accent:       #3b6cf0;
      --accent-hover: #2a58d8;
      --accent-glow:  rgba(59,108,240,0.3);
      --accent-dim:   rgba(59,108,240,0.12);
      --accent-bright:#5a8aff;

      --text-primary:   #c8d0ec;
      --text-secondary: #6878a8;
      --text-muted:     #3a4568;

      --danger:       #e03050;
      --danger-hover: #c82040;
      --warn:         #e8a020;
      --warn-text:    #080a10;
      --green:        #20d8a0;
      --cyan:         #40c8f0;

      --font-display: 'Orbitron', sans-serif;
      --font-body:    'Rajdhani', sans-serif;
      --font-mono:    'Share Tech Mono', monospace;
    }

    body {
      font-family: var(--font-body);
      font-weight: 400;
      background: var(--bg-void);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      letter-spacing: 0.02em;
    }

    /* ── Galactic nebula background ───────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 600px at 20% 20%, rgba(30,50,120,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 600px 400px at 80% 80%, rgba(60,30,120,0.1) 0%, transparent 70%),
        radial-gradient(ellipse 400px 400px at 50% 50%, rgba(20,40,100,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(1.2px 1.2px at 15% 25%, rgba(255,255,255,0.18) 50%, transparent 100%),
        radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,0.1) 50%, transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 15%, rgba(180,200,255,0.15) 50%, transparent 100%),
        radial-gradient(0.8px 0.8px at 75% 45%, rgba(255,255,255,0.08) 50%, transparent 100%),
        radial-gradient(1.3px 1.3px at 10% 75%, rgba(200,220,255,0.12) 50%, transparent 100%),
        radial-gradient(1px 1px at 85% 20%, rgba(255,255,255,0.1) 50%, transparent 100%),
        radial-gradient(1.1px 1.1px at 45% 85%, rgba(180,200,255,0.08) 50%, transparent 100%),
        radial-gradient(0.8px 0.8px at 65% 55%, rgba(255,255,255,0.06) 50%, transparent 100%),
        radial-gradient(1.4px 1.4px at 25% 40%, rgba(200,220,255,0.1) 50%, transparent 100%),
        radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.07) 50%, transparent 100%),
        radial-gradient(0.7px 0.7px at 50% 35%, rgba(255,255,255,0.09) 50%, transparent 100%),
        radial-gradient(1.2px 1.2px at 5% 55%, rgba(180,200,255,0.06) 50%, transparent 100%);
      background-size: 700px 700px, 400px 400px, 350px 350px, 500px 500px, 300px 300px,
                       450px 450px, 600px 600px, 250px 250px, 550px 550px, 380px 380px,
                       420px 420px, 480px 480px;
      animation: starDrift 120s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes starDrift {
      0%   { transform: translateY(0) translateX(0); }
      50%  { transform: translateY(-80px) translateX(30px); }
      100% { transform: translateY(-160px) translateX(0); }
    }

    /* ── Sparkle particles ────────────────────────────────────── */
    .sparkle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: sparkleAnim 2s ease-out forwards;
    }

    @keyframes sparkleAnim {
      0%   { opacity: 0; transform: scale(0) translateY(0); }
      15%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.2) translateY(-50px); }
    }

    /* ── Pointer glow ─────────────────────────────────────────── */
    #pointer-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,108,240,0.12) 0%, rgba(30,50,120,0.06) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transform: translate(-50%, -50%);
      transition: opacity 0.4s;
      opacity: 0;
    }
    body:hover #pointer-glow { opacity: 1; }

    /* ── Framer-style animations ──────────────────────────────── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.96); filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes borderPulse {
      0%, 100% { border-color: var(--border); }
      50%      { border-color: var(--border-glow); }
    }

    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(59,108,240,0.1); }
      50%      { box-shadow: 0 0 40px rgba(59,108,240,0.2); }
    }

    /* ── Buttons ──────────────────────────────────────────────── */
    button {
      cursor: pointer;
      padding: 10px 22px;
      border: 1px solid rgba(59,108,240,0.3);
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      background: linear-gradient(135deg, var(--accent), #2850c8);
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    button::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transition: left 0.5s;
    }
    button:hover::after { left: 120%; }
    button:hover {
      background: linear-gradient(135deg, var(--accent-hover), #2048b8);
      box-shadow: 0 0 30px var(--accent-glow), 0 0 60px rgba(59,108,240,0.1);
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    button:active { transform: translateY(0) scale(0.97); }
    button.danger {
      background: linear-gradient(135deg, var(--danger), #a82040);
      border-color: rgba(224,48,80,0.3);
    }
    button.danger:hover {
      background: linear-gradient(135deg, var(--danger-hover), #a01830);
      box-shadow: 0 0 30px rgba(224,48,80,0.25);
      border-color: var(--danger);
    }
    button.secondary {
      background: var(--bg-elevated);
      border-color: var(--border);
      color: var(--text-secondary);
    }
    button.secondary:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: #2a3860;
      box-shadow: 0 0 20px rgba(59,108,240,0.08);
      transform: translateY(-1px);
    }
    button.muted {
      background: linear-gradient(135deg, var(--warn), #c88010);
      color: var(--warn-text);
      border-color: rgba(232,160,32,0.3);
    }
    button.muted:hover { box-shadow: 0 0 30px rgba(232,160,32,0.2); }
    button:disabled { opacity: 0.3; cursor: default; box-shadow: none; transform: none; }

    /* ── Inputs ───────────────────────────────────────────────── */
    input {
      padding: 11px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: rgba(10,15,30,0.8);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.02em;
      width: 100%;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      outline: none;
    }
    input::placeholder { color: var(--text-muted); font-weight: 400; }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim), 0 0 30px rgba(59,108,240,0.15);
      background: rgba(10,15,30,0.95);
    }
    label {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .field { margin-bottom: 18px; }
    .hidden { display: none !important; }

    /* ── Decorative line ──────────────────────────────────────── */
    .accent-line {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--cyan), var(--accent), transparent);
      border-radius: 1px;
      margin-bottom: 24px;
      opacity: 0.5;
    }

    /* ── Auth screen ──────────────────────────────────────────── */
    #auth-screen {
      max-width: 400px;
      margin: auto;
      padding: 44px 40px;
      background: linear-gradient(170deg, rgba(10,15,30,0.95), rgba(6,10,20,0.98));
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.8),
        0 0 100px rgba(59,108,240,0.04),
        inset 0 1px 0 rgba(255,255,255,0.03);
      position: relative;
      z-index: 2;
      animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      backdrop-filter: blur(20px);
    }
    #auth-screen h2 {
      font-family: var(--font-display);
      margin-bottom: 4px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #e0e8ff, var(--accent-bright), #e0e8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #auth-screen .subtitle {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.06em;
    }
    #auth-screen .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }
    #auth-screen .tabs button {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      border-radius: 5px;
      padding: 9px 16px;
      font-size: 12px;
      letter-spacing: 0.1em;
    }
    #auth-screen .tabs button:hover {
      background: var(--bg-hover);
      box-shadow: none;
      color: var(--text-primary);
      transform: none;
    }
    #auth-screen .tabs button::after { display: none; }
    #auth-screen .tabs button.active {
      background: linear-gradient(135deg, var(--accent), #2850c8);
      color: #fff;
      box-shadow: 0 4px 20px rgba(59,108,240,0.35);
      border: none;
    }
    #auth-error {
      color: #f06070;
      font-family: var(--font-mono);
      font-size: 12px;
      margin-top: 14px;
      min-height: 18px;
    }

    /* ── Lobby screen ─────────────────────────────────────────── */
    #lobby-screen {
      max-width: 520px;
      margin: auto;
      padding: 44px 40px;
      background: linear-gradient(170deg, rgba(10,15,30,0.95), rgba(6,10,20,0.98));
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.8),
        0 0 100px rgba(59,108,240,0.04),
        inset 0 1px 0 rgba(255,255,255,0.03);
      position: relative;
      z-index: 2;
      animation: fadeSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      backdrop-filter: blur(20px);
    }
    #lobby-screen h2 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #e0e8ff, var(--accent-bright), #e0e8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .lobby-section {
      margin-bottom: 28px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border-soft);
    }
    .lobby-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .lobby-section h3 {
      font-family: var(--font-display);
      margin-bottom: 18px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }
    #lobby-error { color: #f06070; font-family: var(--font-mono); font-size: 12px; margin-top: 10px; }
    #user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-soft);
    }
    #lobby-username {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--cyan);
      background: rgba(64,200,240,0.06);
      border: 1px solid rgba(64,200,240,0.15);
      padding: 6px 16px;
      border-radius: 4px;
    }

    /* ── Meeting room ─────────────────────────────────────────── */
    #meeting-screen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      z-index: 2;
    }

    #meeting-header {
      padding: 10px 20px;
      background: linear-gradient(180deg, rgba(10,15,30,0.98), rgba(6,10,20,0.95));
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    #meeting-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #e0e8ff, var(--accent-bright));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #meeting-id-display {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 4px;
    }
    #copy-id-btn {
      font-size: 10px;
      padding: 5px 14px;
      background: var(--bg-elevated);
      border-color: var(--border);
      color: var(--text-secondary);
      letter-spacing: 0.08em;
    }
    #copy-id-btn:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
      box-shadow: none;
    }
    #copy-id-btn::after { display: none; }
    #participant-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      margin-left: auto;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      padding: 5px 16px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #participant-count::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px rgba(32,216,160,0.6);
      animation: glowPulse 2s ease-in-out infinite;
    }
    #meeting-status {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      padding: 5px 20px;
      background: var(--bg-void);
      border-bottom: 1px solid var(--border-soft);
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    /* ── Video grid ───────────────────────────────────────────── */
    #room-body { display: flex; flex: 1; overflow: hidden; }

    #video-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 10px;
      padding: 12px;
      background: var(--bg-void);
      overflow-y: auto;
      align-content: start;
    }

    .video-tile {
      position: relative;
      background: linear-gradient(145deg, var(--bg-surface), var(--bg-void));
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16/9;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .video-tile:hover {
      border-color: #2a3860;
      box-shadow: 0 0 40px rgba(59,108,240,0.08);
    }
    .video-tile video {
      width: 100%; height: 100%; object-fit: cover; display: block;
      background: #000;
    }
    .video-tile .name-tag {
      position: absolute;
      bottom: 10px;
      left: 12px;
      font-family: var(--font-mono);
      background: rgba(6,10,20,0.88);
      color: var(--text-primary);
      font-size: 11px;
      padding: 4px 14px;
      border-radius: 4px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.04);
      letter-spacing: 0.04em;
    }
    .video-tile .avatar {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(145deg, var(--bg-surface), var(--bg-void));
    }
    .video-tile .avatar-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--bg-elevated), rgba(59,108,240,0.08));
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 30px rgba(59,108,240,0.08);
    }
    .video-tile .avatar span {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }
    .video-tile.has-video .avatar { display: none; }

    /* ── Controls bar ─────────────────────────────────────────── */
    #controls {
      padding: 14px 20px;
      background: linear-gradient(0deg, rgba(10,15,30,0.98), rgba(6,10,20,0.95));
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    /* ── Chat panel ───────────────────────────────────────────── */
    #chat-panel {
      width: 290px;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, var(--bg-surface), rgba(6,10,20,0.98));
      border-left: 1px solid var(--border);
    }
    #chat-header {
      font-family: var(--font-display);
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .chat-msg {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      animation: fadeIn 0.3s ease both;
    }
    .chat-msg .sender {
      font-weight: 700;
      color: var(--accent-bright);
    }
    .chat-msg.system {
      font-family: var(--font-mono);
      color: var(--text-muted);
      font-style: normal;
      font-size: 11px;
      text-align: center;
      padding: 4px 0;
      letter-spacing: 0.04em;
    }
    #chat-input-row {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    #chat-input-row input { flex: 1; font-size: 14px; padding: 9px 14px; }
    #chat-input-row button { padding: 9px 16px; flex-shrink: 0; font-size: 12px; }

    /* ── Audio unmute overlay ─────────────────────────────────── */
    #audio-unlock {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: linear-gradient(135deg, rgba(224,48,80,0.9), rgba(180,30,60,0.9));
      border: 1px solid rgba(224,48,80,0.5);
      color: #fff;
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 12px 28px;
      border-radius: 8px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(224,48,80,0.3);
      animation: fadeSlideUp 0.4s ease both, borderPulse 2s ease infinite;
    }
    #audio-unlock:hover {
      box-shadow: 0 8px 40px rgba(224,48,80,0.5);
    }

    /* ── Scrollbar ────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a3860; }
  </style>
</head>
<body>

<!-- Pointer glow -->
<div id="pointer-glow"></div>

<!-- AUTH -->
<div id="auth-screen">
  <h2>Meeting Platform</h2>
  <p class="subtitle">&gt; secure_video_link :: active</p>
  <div class="accent-line"></div>
  <div class="tabs">
    <button class="active" onclick="showTab('login')">Sign In</button>
    <button onclick="showTab('register')">Register</button>
  </div>
  <div id="tab-login">
    <div class="field"><label>Username</label><input id="login-username" type="text" autocomplete="username" /></div>
    <div class="field"><label>Password</label><input id="login-password" type="password" autocomplete="current-password" /></div>
    <button onclick="doLogin()" style="width:100%">Authenticate</button>
  </div>
  <div id="tab-register" class="hidden">
    <div class="field"><label>Username</label><input id="reg-username" type="text" autocomplete="username" /></div>
    <div class="field"><label>Email (optional)</label><input id="reg-email" type="email" /></div>
    <div class="field"><label>Password (min 8 chars)</label><input id="reg-password" type="password" autocomplete="new-password" /></div>
    <button onclick="doRegister()" style="width:100%">Create Account</button>
  </div>
  <div id="auth-error"></div>
</div>

<!-- LOBBY -->
<div id="lobby-screen" class="hidden">
  <div id="user-info">
    <h2>Mission Control</h2>
    <span id="lobby-username"></span>
    <button class="secondary" onclick="doLogout()" style="margin-left:12px">Sign Out</button>
  </div>
  <div class="accent-line"></div>
  <div class="lobby-section">
    <h3>Launch New Session</h3>
    <div class="field"><label>Session Title</label><input id="new-meeting-title" type="text" placeholder="Team Standup" /></div>
    <button onclick="createMeeting()">Create &amp; Join</button>
  </div>
  <div class="lobby-section">
    <h3>Join Existing Session</h3>
    <div class="field"><label>Session ID</label><input id="join-meeting-id" type="text" placeholder="paste UUID here" /></div>
    <button onclick="joinMeetingFromLobby()">Connect</button>
  </div>
  <div id="lobby-error"></div>
</div>

<!-- MEETING ROOM -->
<div id="meeting-screen" class="hidden">
  <div id="meeting-header">
    <span id="meeting-title"></span>
    <span id="meeting-id-display"></span>
    <button id="copy-id-btn" onclick="copyMeetingId()">Copy ID</button>
    <span id="participant-count">1 participant</span>
  </div>
  <div id="meeting-status">&gt; initializing...</div>
  <div id="room-body">
    <div id="video-grid"></div>
    <div id="chat-panel">
      <div id="chat-header">Comms Channel</div>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Transmit message..." maxlength="500"
               onkeydown="if(event.key==='Enter')sendChat()" />
        <button onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>
  <div id="controls">
    <button id="btn-cam"  onclick="toggleCamera()">Cam Off</button>
    <button id="btn-mic"  onclick="toggleMic()">Mute</button>
    <button id="btn-hand" class="secondary" onclick="toggleHand()">Raise Hand</button>
    <button class="danger" onclick="leaveMeeting()" style="margin-left:auto">Disconnect</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  POINTER GLOW + SPARKLES
// ═══════════════════════════════════════════════════════════════
const glow = document.getElementById('pointer-glow');
let sparkleTimer = 0;

document.addEventListener('mousemove', (e) => {
  glow.style.left = e.clientX + 'px';
  glow.style.top = e.clientY + 'px';

  sparkleTimer++;
  if (sparkleTimer % 12 === 0) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = (e.clientX + (Math.random() - 0.5) * 50) + 'px';
    s.style.top = (e.clientY + (Math.random() - 0.5) * 50) + 'px';
    const size = (1 + Math.random() * 2) + 'px';
    s.style.width = size;
    s.style.height = size;
    const colors = ['rgba(59,108,240,0.8)', 'rgba(90,138,255,0.7)', 'rgba(255,255,255,0.5)', 'rgba(64,200,240,0.6)'];
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    s.style.boxShadow = `0 0 4px ${s.style.background}`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 2000);
  }
});

// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const API_BASE = "http://127.0.0.1:8000/api";
const WS_BASE  = "ws://127.0.0.1:8000";

const ICE_SERVERS = [
  { urls: "stun:stun.l.google.com:19302" },
  { urls: "stun:stun1.l.google.com:19302" },
];

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
const state = {
  access: null, refresh: null, user: null,
  meetingId: null,
  presenceWs: null,
  camEnabled: true,
  micEnabled: true,
  handRaised: false,
  audioUnlocked: false,
};

let localStream = null;
const connections = {};
// Keep references to remote audio elements for unlock
const remoteAudioEls = [];

// ═══════════════════════════════════════════════════════════════
//  AUDIO AUTOPLAY FIX
// ═══════════════════════════════════════════════════════════════

// Browsers block unmuted autoplay until a user gesture.
// Strategy:
// 1. Try to play video+audio immediately.
// 2. If blocked, show an "Unlock Audio" button.
// 3. On click, replay all remote media and mark as unlocked.

function tryPlayMedia(videoEl) {
  videoEl.muted = false;        // we WANT audio
  const p = videoEl.play();
  if (p && p.catch) {
    p.catch(() => {
      // Autoplay blocked — mute to get video going, show unlock button
      videoEl.muted = true;
      videoEl.play().catch(() => {});
      showAudioUnlock();
    });
  }
}

function showAudioUnlock() {
  if (state.audioUnlocked) return;
  if (document.getElementById('audio-unlock')) return;
  const btn = document.createElement('button');
  btn.id = 'audio-unlock';
  btn.textContent = 'CLICK TO ENABLE AUDIO';
  btn.onclick = () => {
    state.audioUnlocked = true;
    // Unmute and replay every remote video
    remoteAudioEls.forEach(v => {
      v.muted = false;
      v.play().catch(() => {});
    });
    btn.remove();
  };
  document.body.appendChild(btn);
}

// Also unlock audio on any user click anywhere (belt + suspenders)
document.addEventListener('click', () => {
  if (!state.audioUnlocked && remoteAudioEls.length > 0) {
    state.audioUnlocked = true;
    remoteAudioEls.forEach(v => {
      v.muted = false;
      v.play().catch(() => {});
    });
    const btn = document.getElementById('audio-unlock');
    if (btn) btn.remove();
  }
}, { once: false });

// ═══════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════
async function apiFetch(path, options = {}) {
  const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
  if (state.access) headers["Authorization"] = `Bearer ${state.access}`;
  const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
  return body;
}

function showScreen(id) {
  ["auth-screen","lobby-screen","meeting-screen"].forEach(s => {
    const el = document.getElementById(s);
    el.classList.toggle("hidden", s !== id);
    if (s === id) {
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    }
  });
}

function setStatus(msg) {
  document.getElementById("meeting-status").textContent = "> " + msg;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ═══════════════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════════════
function showTab(tab) {
  document.getElementById("tab-login").classList.toggle("hidden", tab !== "login");
  document.getElementById("tab-register").classList.toggle("hidden", tab !== "register");
  document.querySelectorAll("#auth-screen .tabs button").forEach((b, i) => {
    b.classList.toggle("active", (i===0 && tab==="login") || (i===1 && tab==="register"));
  });
}

async function doLogin() {
  try {
    const data = await apiFetch("/auth/login/", {
      method: "POST",
      body: JSON.stringify({
        username: document.getElementById("login-username").value.trim(),
        password: document.getElementById("login-password").value,
      }),
    });
    onAuthSuccess(data);
  } catch(e) { document.getElementById("auth-error").textContent = e.message; }
}

async function doRegister() {
  try {
    const data = await apiFetch("/auth/register/", {
      method: "POST",
      body: JSON.stringify({
        username: document.getElementById("reg-username").value.trim(),
        email:    document.getElementById("reg-email").value.trim(),
        password: document.getElementById("reg-password").value,
      }),
    });
    onAuthSuccess(data);
  } catch(e) { document.getElementById("auth-error").textContent = e.message; }
}

function onAuthSuccess(data) {
  state.access  = data.access;
  state.refresh = data.refresh;
  state.user    = data.user;
  document.getElementById("auth-error").textContent = "";
  document.getElementById("lobby-username").textContent = state.user.username;
  showScreen("lobby-screen");
}

function doLogout() {
  state.access = state.refresh = state.user = null;
  showScreen("auth-screen");
}

// ═══════════════════════════════════════════════════════════════
//  LOBBY
// ═══════════════════════════════════════════════════════════════
async function createMeeting() {
  const title = document.getElementById("new-meeting-title").value.trim() || "My Meeting";
  try {
    const m = await apiFetch("/meetings/", { method:"POST", body:JSON.stringify({title}) });
    await enterMeeting(m.id, m.title);
  } catch(e) { document.getElementById("lobby-error").textContent = e.message; }
}

async function joinMeetingFromLobby() {
  const id = document.getElementById("join-meeting-id").value.trim();
  if (!id) { document.getElementById("lobby-error").textContent = "Enter a meeting ID"; return; }
  try {
    await enterMeeting(id);
  } catch(e) { document.getElementById("lobby-error").textContent = e.message; }
}

function copyMeetingId() {
  navigator.clipboard.writeText(state.meetingId).then(() => {
    const btn = document.getElementById("copy-id-btn");
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy ID", 1500);
  });
}

// ═══════════════════════════════════════════════════════════════
//  MEETING ENTRY
// ═══════════════════════════════════════════════════════════════
async function enterMeeting(meetingId, title) {
  const joinData = await apiFetch(`/meetings/${meetingId}/join/`, { method:"POST" });
  state.meetingId = meetingId;
  state.audioUnlocked = false;

  document.getElementById("meeting-title").textContent = joinData.title || title || "Meeting";
  document.getElementById("meeting-id-display").textContent = meetingId;
  showScreen("meeting-screen");
  setStatus("accessing camera and microphone...");

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch(e) {
    console.warn("Camera failed, trying audio-only:", e);
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e2) {
      console.warn("Audio also failed:", e2);
      localStream = null;
    }
  }

  addLocalTile();
  setStatus("connecting to session...");
  connectPresenceWS(meetingId);
}

// ═══════════════════════════════════════════════════════════════
//  LOCAL MEDIA TILE
// ═══════════════════════════════════════════════════════════════
function addLocalTile() {
  const grid = document.getElementById("video-grid");
  let tile = document.getElementById("tile-local");
  if (!tile) {
    tile = makeTile("local", `${state.user.username} (you)`);
    grid.appendChild(tile);
  }
  const video = tile.querySelector("video");
  if (localStream) {
    video.srcObject = localStream;
    video.muted = true;          // never play back own audio (prevents echo)
    video.autoplay = true;
    video.playsInline = true;
    video.play().catch(() => {});
    const hasVideo = localStream.getVideoTracks().length > 0;
    tile.classList.toggle("has-video", hasVideo);
  }
  updateParticipantCount();
}

// ═══════════════════════════════════════════════════════════════
//  DJANGO CHANNELS — presence + signaling relay
// ═══════════════════════════════════════════════════════════════
function connectPresenceWS(meetingId) {
  const ws = new WebSocket(`${WS_BASE}/ws/meeting/${meetingId}/?token=${state.access}`);
  state.presenceWs = ws;

  ws.onopen = () => setStatus("connected — waiting for others...");

  ws.onmessage = async (evt) => {
    const msg = JSON.parse(evt.data);

    switch (msg.type) {
      case "room_state":
        if (msg.participants.length === 0) {
          setStatus("you are the first one here. share the session ID to invite others.");
        } else {
          setStatus(`${msg.participants.length} peer(s) in session. establishing link...`);
        }
        for (const p of msg.participants) {
          if (state.user.id > p.user_id) {
            await initiateOffer(p.user_id, p.username);
          }
        }
        break;

      case "participant_joined":
        if (msg.user_id === state.user.id) break;
        addChatSystem(`${msg.username} joined the session`);
        updateParticipantCount();
        if (state.user.id > msg.user_id) {
          await initiateOffer(msg.user_id, msg.username);
        }
        break;

      case "participant_left":
        addChatSystem(`${msg.username} left the session`);
        closePeer(msg.user_id);
        removeTile(`remote-${msg.user_id}`);
        updateParticipantCount();
        break;

      case "webrtc_signal":
        await handleSignal(msg.from, msg.from_username, msg.signal);
        break;

      case "chat":
        addChatMessage(msg.username, msg.message);
        break;

      case "hand_raise":
        addChatSystem(msg.raised
          ? `${msg.username} raised their hand`
          : `${msg.username} lowered their hand`);
        break;

      case "meeting_ended":
        addChatSystem("Session terminated by host");
        await leaveMeeting();
        break;

      case "error":
        setStatus(`error: ${msg.message}`);
        break;
    }
  };

  ws.onerror = () => setStatus("websocket error — check console");
  ws.onclose = (e) => {
    if (e.code === 4001) setStatus("disconnected: authentication failed");
    else if (e.code === 4003) setStatus("disconnected: session access denied");
    else setStatus("disconnected");
  };
}

function sendWS(data) {
  if (state.presenceWs && state.presenceWs.readyState === WebSocket.OPEN) {
    state.presenceWs.send(JSON.stringify(data));
  }
}

// ═══════════════════════════════════════════════════════════════
//  WEBRTC — P2P signaling
// ═══════════════════════════════════════════════════════════════
function makePeerConnection(remoteUserId, remoteUsername) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  connections[remoteUserId] = pc;

  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }

  pc.ontrack = (evt) => {
    const stream = evt.streams[0];
    if (stream) {
      addRemoteTile(remoteUserId, remoteUsername, stream);
      setStatus(`linked with ${remoteUsername}`);
    }
  };

  pc.onicecandidate = (evt) => {
    if (evt.candidate) {
      sendWS({
        type: "webrtc_signal",
        to: remoteUserId,
        signal: { type: "ice", candidate: evt.candidate.toJSON() },
      });
    }
  };

  pc.onconnectionstatechange = () => {
    const s = pc.connectionState;
    if (s === "connected")     setStatus(`linked with ${remoteUsername}`);
    if (s === "disconnected")  setStatus(`${remoteUsername} disconnected`);
    if (s === "failed")        setStatus(`link to ${remoteUsername} failed — try rejoining`);
  };

  return pc;
}

async function initiateOffer(remoteUserId, remoteUsername) {
  if (connections[remoteUserId]) return;
  console.log(`[WebRTC] Creating offer → ${remoteUsername} (${remoteUserId})`);

  const pc = makePeerConnection(remoteUserId, remoteUsername);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  sendWS({
    type: "webrtc_signal",
    to: remoteUserId,
    signal: { type: "offer", sdp: { type: offer.type, sdp: offer.sdp } },
  });
}

async function handleSignal(fromUserId, fromUsername, signal) {
  if (!signal) return;

  if (signal.type === "offer") {
    if (connections[fromUserId]) return;
    console.log(`[WebRTC] Received offer from ${fromUsername}`);

    const pc = makePeerConnection(fromUserId, fromUsername);
    await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    sendWS({
      type: "webrtc_signal",
      to: fromUserId,
      signal: { type: "answer", sdp: { type: answer.type, sdp: answer.sdp } },
    });

  } else if (signal.type === "answer") {
    const pc = connections[fromUserId];
    if (pc) {
      console.log(`[WebRTC] Received answer from ${fromUsername}`);
      await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
    }

  } else if (signal.type === "ice") {
    const pc = connections[fromUserId];
    if (pc && signal.candidate) {
      try {
        await pc.addIceCandidate(new RTCIceCandidate(signal.candidate));
      } catch(e) {
        console.warn("[WebRTC] ICE candidate error:", e);
      }
    }
  }
}

function closePeer(userId) {
  const pc = connections[userId];
  if (pc) { pc.close(); delete connections[userId]; }
}

// ═══════════════════════════════════════════════════════════════
//  VIDEO TILES
// ═══════════════════════════════════════════════════════════════
function makeTile(id, displayName) {
  const tile = document.createElement("div");
  tile.className = "video-tile";
  tile.id = `tile-${id}`;
  tile.innerHTML = `
    <video autoplay playsinline></video>
    <div class="avatar">
      <div class="avatar-icon">&#127909;</div>
      <span>${escHtml(displayName)}</span>
    </div>
    <div class="name-tag">${escHtml(displayName)}</div>
  `;
  return tile;
}

function addRemoteTile(userId, username, stream) {
  const grid = document.getElementById("video-grid");
  const tileId = `remote-${userId}`;
  let tile = document.getElementById(`tile-${tileId}`);
  if (!tile) {
    tile = makeTile(tileId, username);
    grid.appendChild(tile);
  }
  const video = tile.querySelector("video");
  video.srcObject = stream;
  video.autoplay = true;
  video.playsInline = true;

  // Track this element for audio unlock
  if (!remoteAudioEls.includes(video)) {
    remoteAudioEls.push(video);
  }

  // Try playing with audio
  if (state.audioUnlocked) {
    video.muted = false;
    video.play().catch(() => {});
  } else {
    tryPlayMedia(video);
  }

  const hasVideo = stream.getVideoTracks().length > 0;
  tile.classList.toggle("has-video", hasVideo);
  updateParticipantCount();
}

function removeTile(id) {
  const t = document.getElementById(`tile-${id}`);
  if (t) {
    // Remove from audio tracking
    const video = t.querySelector("video");
    const idx = remoteAudioEls.indexOf(video);
    if (idx !== -1) remoteAudioEls.splice(idx, 1);

    t.style.animation = 'fadeIn 0.3s ease reverse';
    setTimeout(() => t.remove(), 300);
  }
  updateParticipantCount();
}

function updateParticipantCount() {
  const n = document.querySelectorAll(".video-tile").length;
  document.getElementById("participant-count").textContent =
    `${n} participant${n !== 1 ? "s" : ""}`;
}

// ═══════════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════════
function toggleCamera() {
  const track = localStream && localStream.getVideoTracks()[0];
  if (!track) return;
  state.camEnabled = !state.camEnabled;
  track.enabled = state.camEnabled;
  const btn = document.getElementById("btn-cam");
  btn.textContent = state.camEnabled ? "Cam Off" : "Cam On";
  btn.className = state.camEnabled ? "" : "secondary";
  const tile = document.getElementById("tile-local");
  if (tile) tile.classList.toggle("has-video", state.camEnabled);
}

function toggleMic() {
  const track = localStream && localStream.getAudioTracks()[0];
  if (!track) return;
  state.micEnabled = !state.micEnabled;
  track.enabled = state.micEnabled;
  const btn = document.getElementById("btn-mic");
  btn.textContent = state.micEnabled ? "Mute" : "Unmute";
  btn.className = state.micEnabled ? "" : "muted";
}

function toggleHand() {
  state.handRaised = !state.handRaised;
  const btn = document.getElementById("btn-hand");
  btn.textContent = state.handRaised ? "Lower Hand" : "Raise Hand";
  btn.className = state.handRaised ? "muted" : "secondary";
  sendWS({ type: "hand_raise", raised: state.handRaised });
}

async function leaveMeeting() {
  Object.keys(connections).forEach(id => { connections[id].close(); delete connections[id]; });
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (state.presenceWs) { state.presenceWs.close(); state.presenceWs = null; }
  try { await apiFetch(`/meetings/${state.meetingId}/leave/`, { method:"POST" }); } catch(_) {}

  // Cleanup audio tracking
  remoteAudioEls.length = 0;
  const unlockBtn = document.getElementById('audio-unlock');
  if (unlockBtn) unlockBtn.remove();

  document.getElementById("video-grid").innerHTML = "";
  document.getElementById("chat-messages").innerHTML = "";
  state.meetingId = null;
  state.camEnabled = true;
  state.micEnabled = true;
  state.handRaised = false;
  state.audioUnlocked = false;
  showScreen("lobby-screen");
}

// ═══════════════════════════════════════════════════════════════
//  CHAT
// ═══════════════════════════════════════════════════════════════
function sendChat() {
  const input = document.getElementById("chat-input");
  const msg = input.value.trim();
  if (!msg) return;
  sendWS({ type: "chat", message: msg });
  input.value = "";
}

function addChatMessage(sender, text) {
  const d = document.createElement("div");
  d.className = "chat-msg";
  d.innerHTML = `<span class="sender">${escHtml(sender)}:</span> ${escHtml(text)}`;
  appendChat(d);
}

function addChatSystem(text) {
  const d = document.createElement("div");
  d.className = "chat-msg system";
  d.textContent = "> " + text;
  appendChat(d);
}

function appendChat(el) {
  const box = document.getElementById("chat-messages");
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
